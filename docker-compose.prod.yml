version: "3.9"

# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  server:
    restart: always
    environment:
      NODE_ENV: production
    healthcheck:
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  web:
    restart: always
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/index.html"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
