<svg viewBox="0 0 720 420" xmlns="http://www.w3.org/2000/svg" font-family="monospace, sans-serif">
  <title>FluxForge Server Configuration</title>

  <!-- Background -->
  <rect width="720" height="420" fill="#f8fafc" rx="10"/>

  <!-- EC2 boundary -->
  <rect x="10" y="10" width="700" height="400" rx="8" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="26" y="28" font-size="10" fill="#94a3b8" font-family="sans-serif">EC2 t3.micro · ap-southeast-1</text>

  <!-- Browser -->
  <rect x="30" y="50" width="120" height="52" rx="6" fill="#e2e8f0"/>
  <text x="90" y="72" text-anchor="middle" font-size="11" fill="#1e293b" font-family="sans-serif" font-weight="600">Browser</text>
  <text x="90" y="88" text-anchor="middle" font-size="9" fill="#64748b">Public Internet</text>

  <!-- Browser arrow -->
  <line x1="150" y1="76" x2="240" y2="76" stroke="#0d7377" stroke-width="1.8" marker-end="url(#arr)"/>
  <rect x="162" y="62" width="58" height="16" rx="3" fill="#0d7377"/>
  <text x="191" y="74" text-anchor="middle" font-size="9" fill="#fff">:80 HTTP</text>

  <!-- nginx container -->
  <rect x="240" y="40" width="160" height="220" rx="7" fill="#fff" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="240" y="40" width="160" height="28" rx="7" fill="#0d7377"/>
  <rect x="240" y="54" width="160" height="14" fill="#0d7377"/>
  <text x="320" y="58" text-anchor="middle" font-size="11" fill="#fff" font-family="sans-serif" font-weight="700">nginx : web</text>
  <text x="256" y="86"  font-size="9" fill="#64748b">listen 80</text>
  <text x="256" y="100" font-size="9" fill="#1e293b">/ → index.html (SPA)</text>
  <text x="256" y="114" font-size="9" fill="#1e293b">/api/ → proxy</text>
  <rect x="254" y="122" width="132" height="34" rx="4" fill="#e2e8f0"/>
  <text x="320" y="136" text-anchor="middle" font-size="8.5" fill="#64748b">Static assets (dist/)</text>
  <text x="320" y="149" text-anchor="middle" font-size="8" fill="#94a3b8">js · css · svg · woff2</text>
  <text x="256" y="172" font-size="8" fill="#94a3b8">assets: 1y cache immutable</text>
  <text x="256" y="184" font-size="8" fill="#94a3b8">index.html: no-store</text>
  <rect x="254" y="200" width="132" height="22" rx="4" fill="#dbeafe"/>
  <text x="320" y="215" text-anchor="middle" font-size="9" fill="#1e40af">host :80 → container :80</text>
  <text x="320" y="248" text-anchor="middle" font-size="8" fill="#94a3b8">nginx:alpine · ECR</text>

  <!-- nginx → server arrow -->
  <line x1="400" y1="130" x2="470" y2="130" stroke="#7c3aed" stroke-width="1.8" marker-end="url(#arr-p)"/>
  <rect x="404" y="116" width="62" height="16" rx="3" fill="#7c3aed"/>
  <text x="435" y="128" text-anchor="middle" font-size="9" fill="#fff">:8081</text>

  <!-- Express server container -->
  <rect x="470" y="40" width="200" height="290" rx="7" fill="#fff" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="470" y="40" width="200" height="28" rx="7" fill="#7c3aed"/>
  <rect x="470" y="54" width="200" height="14" fill="#7c3aed"/>
  <text x="570" y="58" text-anchor="middle" font-size="11" fill="#fff" font-family="sans-serif" font-weight="700">Express : server</text>
  <text x="486" y="84"  font-size="9" fill="#64748b">PORT</text>
  <text x="570" y="84"  font-size="9" fill="#1e293b" font-weight="600">8081</text>
  <text x="486" y="99"  font-size="9" fill="#64748b">DB_PATH</text>
  <text x="570" y="99"  font-size="9" fill="#1e293b">/data/fluxforge.db</text>
  <text x="486" y="114" font-size="9" fill="#64748b">UPLOAD_DIR</text>
  <text x="570" y="114" font-size="9" fill="#1e293b">/data/uploads</text>
  <text x="486" y="129" font-size="9" fill="#64748b">NODE_ENV</text>
  <text x="570" y="129" font-size="9" fill="#1e293b">production</text>
  <text x="486" y="144" font-size="9" fill="#64748b">JWT_SECRET</text>
  <text x="570" y="144" font-size="9" fill="#1e293b">••••••••</text>
  <text x="486" y="159" font-size="9" fill="#64748b">upload limit</text>
  <text x="570" y="159" font-size="9" fill="#1e293b">50 MB</text>
  <line x1="486" y1="166" x2="654" y2="166" stroke="#cbd5e1" stroke-width="0.8"/>
  <text x="486" y="180" font-size="8.5" fill="#94a3b8">Routes</text>
  <text x="486" y="193" font-size="8.5" fill="#1e293b">/api/health</text>
  <text x="486" y="206" font-size="8.5" fill="#1e293b">/api/auth/*</text>
  <text x="486" y="219" font-size="8.5" fill="#1e293b">/api/files/*</text>
  <text x="486" y="232" font-size="8.5" fill="#1e293b">/api/components/*</text>
  <text x="486" y="245" font-size="8.5" fill="#1e293b">/api/designs/*</text>
  <rect x="486" y="254" width="168" height="22" rx="4" fill="#ede9fe"/>
  <text x="570" y="269" text-anchor="middle" font-size="9" fill="#6d28d9">host :8099 → container :8081</text>
  <rect x="486" y="280" width="168" height="34" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="570" y="295" text-anchor="middle" font-size="9" fill="#92400e" font-weight="600">fluxforge-data (volume)</text>
  <text x="570" y="308" text-anchor="middle" font-size="8" fill="#92400e">/data → SQLite + uploads</text>
  <text x="570" y="318" text-anchor="middle" font-size="8" fill="#94a3b8">node:22-alpine · ECR</text>

  <!-- Security group -->
  <rect x="30" y="340" width="650" height="52" rx="6" fill="#e2e8f0"/>
  <text x="46" y="358" font-size="10" fill="#1e293b" font-family="sans-serif" font-weight="600">Security Group: fluxforge-sg</text>
  <text x="46" y="374" font-size="9" fill="#64748b">Inbound:  :22 SSH (0.0.0.0/0)  ·  :80 HTTP (0.0.0.0/0)  ·  :8081 API (0.0.0.0/0, dev direct access)</text>
  <text x="46" y="387" font-size="9" fill="#64748b">Outbound: all traffic  ·  IAM role: fluxforge-ec2-role → AmazonEC2ContainerRegistryReadOnly</text>

  <defs>
    <marker id="arr"   markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#0d7377"/>
    </marker>
    <marker id="arr-p" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#7c3aed"/>
    </marker>
  </defs>
</svg>
