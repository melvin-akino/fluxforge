version: "3.9"

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    env_file: .env
    environment:
      PORT: "8081"
      DB_PATH: /data/fluxforge.db
      UPLOAD_DIR: /data/uploads
    volumes:
      - fluxforge-data:/data
    ports:
      - "8099:8081"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "5200:80"
    depends_on:
      server:
        condition: service_healthy

volumes:
  fluxforge-data:
